<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link rel="stylesheet" href="../static/loginstyle.css">
</head>


<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  input[type="text"],
  input[type="password"],
  input[type="submit"],
  select {
    width: 200px;
    padding: 5px;
    margin-bottom: 10px;
    box-sizing: border-box;
    font-family: 'Poppins', 'sans-serif';
    font-size: 15px;
    border-radius: 5px;
    border: solid rgb(37,61,144);
  }
</style>
<body class="loginbg">

<div class="login">
  <div id="houselogo">
    <img src="OOP_Icon-removebg-preview (1) 1.png" alt="logo" class="logo" width="350" height="300">
  </div>

  <form >

    <h1 class="h1login">
      Login
    </h1>
    <div id="logindescription">
      <p>Login to your account.</p>
    </div>
    <br><br><br><br><br><br><br>
    <div class="input-box1">
      <label for="userName"> Email address or Username </label><br>
      <input type="text"
             style="width: 500px;
                       height: 45px"
             id="userName"
             name="userName" required/> <br><br>
    </div>
    <div class="input-box1">
      <label for="passWord"> Password</label><br>
      <input type="password"
             style="width: 500px;
                       height: 45px"
             id="passWord"
             name="passWord" required/><br><br><br><br>
    </div>
    <div class="register">
      <small>Don't have an account yet?
        <a href="signup.html"><strong>Register.</strong> </a> </small> <br>
      <button id="submitbutton" type="submit" >Sign in</button>
    </div>
  </form>

</div>
</body>
</html>
